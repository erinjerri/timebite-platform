    background: "#0E1116"
    surface: "#171B22"
    primaryText: "#F9FAFB"
    secondaryText: "#9CA3AF"
    accent: "#A78BFA"
    ringPrimary: "#8B5CF6"
    ringSecondary: "#312E81"
