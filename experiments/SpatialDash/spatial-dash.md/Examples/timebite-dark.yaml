    mode: dimAmbient
    shadow: subtleGlow
    contrast: low

avatar:
  enabled: false
  style: none
  behavior: none

constraints:
  preserve_core_navigation: true
  preserve_torus_geometry: true
  max_motion_intensity: safe
  min_text_contrast: accessible

